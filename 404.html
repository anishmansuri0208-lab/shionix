<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shionix — Page Not Found</title>
  <style>
    body{margin:0;background:#000;color:#fff;font-family:Inter,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .box{text-align:center;padding:20px;}
    .logo{font-size:2.5rem;font-weight:900;margin-bottom:8px;letter-spacing:-2px;}
    .logo span{color:#0066FF;}
    p{color:#666;margin-bottom:28px;font-size:1rem;}
    a{background:#0066FF;color:#fff;padding:14px 32px;border-radius:12px;text-decoration:none;font-weight:700;font-size:1rem;}
    a:hover{background:#3385FF;}
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">Shio<span>nix</span></div>
    <p>Page not found — redirecting to home...</p>
    <a href="/">Go to Home</a>
    <script>setTimeout(()=>window.location.href='/',2000)</script>
  </div>
</body>
</html>
